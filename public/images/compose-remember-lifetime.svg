<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">remember의 생명주기</title>
  <desc id="desc">Composable이 Composition에 들어오고 유지되고 빠질 때 remember 값이 언제 유지되고 언제 잊히는지 보여주는 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4eeff"/>
      <stop offset="100%" stop-color="#ded1ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e1faee"/>
      <stop offset="100%" stop-color="#bff1d7"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0f0"/>
      <stop offset="100%" stop-color="#ffd7d7"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="135%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#102033" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 38px; font-weight: 900; fill: #121826; letter-spacing: 0; }
      .subtitle { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #667085; letter-spacing: 0; }
      .label { font-family: Arial, sans-serif; font-size: 27px; font-weight: 900; fill: #121826; letter-spacing: 0; }
      .text { font-family: Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #354052; letter-spacing: 0; }
      .small { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #667085; letter-spacing: 0; }
      .code { font-family: Menlo, Consolas, monospace; font-size: 19px; font-weight: 800; fill: #172033; }
      .card { fill: #ffffff; stroke: #d9e2f1; stroke-width: 2; filter: url(#shadow); }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <circle cx="1050" cy="96" r="92" fill="#7c5cff" opacity="0.08"/>
  <circle cx="130" cy="520" r="110" fill="#18a058" opacity="0.08"/>

  <text x="60" y="72" class="title">remember는 Composition에 있는 동안만 기억합니다</text>
  <text x="62" y="110" class="subtitle">화면 회전이나 프로세스 종료까지 자동으로 보존하는 장치는 아닙니다</text>

  <g transform="translate(90 178)">
    <rect x="0" y="0" width="280" height="154" rx="28" fill="url(#purple)" stroke="#7c5cff" stroke-width="3" filter="url(#shadow)"/>
    <text x="34" y="54" class="label">들어옴</text>
    <text x="34" y="96" class="text">Composition에 추가</text>
    <text x="34" y="128" class="small">remember 값 생성</text>
  </g>

  <g transform="translate(460 178)">
    <rect x="0" y="0" width="280" height="154" rx="28" fill="url(#green)" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
    <text x="34" y="54" class="label">유지됨</text>
    <text x="34" y="96" class="text">Recomposition 반복</text>
    <text x="34" y="128" class="small">이전 값 재사용</text>
  </g>

  <g transform="translate(830 178)">
    <rect x="0" y="0" width="280" height="154" rx="28" fill="url(#red)" stroke="#ef4444" stroke-width="3" filter="url(#shadow)"/>
    <text x="34" y="54" class="label">빠져나감</text>
    <text x="34" y="96" class="text">Composition에서 제거</text>
    <text x="34" y="128" class="small">remember 값도 잊힘</text>
  </g>

  <path d="M380 256 H450" class="arrow"/>
  <path d="M434 238 L458 256 L434 274" class="arrow"/>
  <path d="M750 256 H820" class="arrow"/>
  <path d="M804 238 L828 256 L804 274" class="arrow"/>

  <g transform="translate(150 430)">
    <rect class="card" x="0" y="0" width="900" height="112" rx="26"/>
    <rect x="0" y="0" width="8" height="112" rx="4" fill="#ef4444"/>
    <text x="30" y="44" class="code">if (showDialog) { DialogContent() }</text>
    <text x="30" y="82" class="small">showDialog가 false가 되어 DialogContent가 사라지면, 그 안의 remember 값도 함께 사라집니다.</text>
  </g>
</svg>
