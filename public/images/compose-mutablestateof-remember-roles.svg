<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">remember와 mutableStateOf의 역할 분리</title>
  <desc id="desc">remember는 MutableState 객체를 기억하고 mutableStateOf는 value 변경을 알리는 역할을 한다는 차이를 설명하는 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4eeff"/>
      <stop offset="100%" stop-color="#ded1ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e1faee"/>
      <stop offset="100%" stop-color="#bff1d7"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6d9"/>
      <stop offset="100%" stop-color="#ffe7a6"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="135%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#102033" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 38px; font-weight: 900; fill: #121826; letter-spacing: 0; }
      .subtitle { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #667085; letter-spacing: 0; }
      .label { font-family: Arial, sans-serif; font-size: 27px; font-weight: 900; fill: #121826; letter-spacing: 0; }
      .text { font-family: Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #354052; letter-spacing: 0; }
      .small { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #667085; letter-spacing: 0; }
      .code { font-family: Menlo, Consolas, monospace; font-size: 20px; font-weight: 800; fill: #172033; }
      .card { fill: #ffffff; stroke: #d9e2f1; stroke-width: 2; filter: url(#shadow); }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <circle cx="1050" cy="95" r="92" fill="#7c5cff" opacity="0.08"/>
  <circle cx="130" cy="520" r="110" fill="#18a058" opacity="0.08"/>

  <text x="60" y="72" class="title">remember와 mutableStateOf는 서로 다른 문제를 풉니다</text>
  <text x="62" y="110" class="subtitle">remember는 상태 상자를 유지하고, mutableStateOf는 상자 안 value 변경을 Compose에 알립니다</text>

  <g transform="translate(82 180)">
    <rect x="0" y="0" width="300" height="166" rx="28" fill="url(#purple)" stroke="#7c5cff" stroke-width="3" filter="url(#shadow)"/>
    <text x="34" y="54" class="label">remember</text>
    <text x="34" y="96" class="text">MutableState 객체를</text>
    <text x="34" y="126" class="text">recomposition 사이에 유지</text>
  </g>

  <g transform="translate(450 168)">
    <rect x="0" y="0" width="300" height="190" rx="30" fill="url(#yellow)" stroke="#d19400" stroke-width="3" filter="url(#shadow)"/>
    <text x="34" y="54" class="label">MutableState</text>
    <line x1="34" y1="78" x2="266" y2="78" stroke="#d19400" stroke-width="3" stroke-linecap="round"/>
    <text x="42" y="122" class="code">value = 0</text>
    <text x="42" y="154" class="small">읽기와 쓰기를 추적할 수 있음</text>
  </g>

  <g transform="translate(818 180)">
    <rect x="0" y="0" width="300" height="166" rx="28" fill="url(#green)" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
    <text x="34" y="54" class="label">mutableStateOf</text>
    <text x="34" y="96" class="text">관찰 가능한</text>
    <text x="34" y="126" class="text">MutableState 생성</text>
  </g>

  <path d="M392 264 H440" class="arrow"/>
  <path d="M424 246 L448 264 L424 282" class="arrow"/>
  <path d="M760 264 H808" class="arrow"/>
  <path d="M792 246 L816 264 L792 282" class="arrow"/>

  <g transform="translate(170 430)">
    <rect class="card" x="0" y="0" width="860" height="104" rx="26"/>
    <rect x="0" y="0" width="8" height="104" rx="4" fill="#d19400"/>
    <text x="30" y="42" class="code">var count by remember { mutableStateOf(0) }</text>
    <text x="30" y="78" class="small">remember가 없으면 상태 상자 자체가 다시 만들어질 수 있고, mutableStateOf가 없으면 Compose가 변경을 알 수 없습니다.</text>
  </g>
</svg>
